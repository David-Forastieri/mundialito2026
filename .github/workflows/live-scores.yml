name: Live Scores Sync

on:
  schedule:
    # Cada 5 minutos — el job se cancela solo si no hay partido activo
    # GitHub Actions plan Free: 2000 min/mes. Este workflow usa ~1 min por run.
    # Solo activo durante el Mundial (11 Jun — 19 Jul 2026)
    - cron: '*/5 * * * *'

  # Trigger manual desde GitHub UI → útil para testear o forzar sync
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de sincronización'
        required: false
        default: 'live'
        type: choice
        options:
          - live    # solo partidos en vivo
          - today   # partidos de hoy
          - all     # fixture completo (usar con cuidado, gasta requests API)

jobs:
  # ── Pre-check: ¿Vale la pena correr? ────────────────────────────
  check:
    name: Check conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      reason: ${{ steps.evaluate.outputs.reason }}

    steps:
      - name: Evaluate conditions
        id: evaluate
        run: |
          # Si es trigger manual, siempre correr
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "reason=Manual trigger" >> $GITHUB_OUTPUT
            exit 0
          fi

          NOW_EPOCH=$(date -u +%s)
          NOW_HOUR=$(date -u +%H)
          NOW_MIN=$(date -u +%M)

          # Fechas del Mundial 2026 (UTC)
          MUNDIAL_START=$(python3 -c "import datetime,calendar; print(int(datetime.datetime(2026,6,11,0,0,0).timestamp()))")
          MUNDIAL_END=$(python3 -c "import datetime,calendar; print(int(datetime.datetime(2026,7,20,0,0,0).timestamp()))")

          # Fuera del Mundial → skip
          if [ $NOW_EPOCH -lt $MUNDIAL_START ] || [ $NOW_EPOCH -gt $MUNDIAL_END ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "reason=Fuera de fechas del Mundial (11 Jun - 19 Jul 2026)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Durante el Mundial, solo correr entre 15:00 y 05:00 UTC (horario de partidos)
          # Primer partido: ~13:00 ARG = 16:00 UTC — arrancamos a las 15:00 UTC (1h de margen)
          # Ultimo partido: ~23:00 ARG = 02:00 UTC; con tiempo extra + penales termina ~04:25 UTC
          CURRENT_MINS=$((NOW_HOUR * 60 + NOW_MIN))
          MATCH_START_MINS=$((15 * 60))   # 15:00 UTC = 12:00 ARG

          IN_EVENING=$( [ $CURRENT_MINS -ge $MATCH_START_MINS ] && echo "true" || echo "false" )
          IN_EARLY=$( [ $NOW_HOUR -lt 5 ] && echo "true" || echo "false" )

          if [ "$IN_EVENING" = "true" ] || [ "$IN_EARLY" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "reason=Horario de partidos (${NOW_HOUR}:${NOW_MIN} UTC)" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "reason=Sin partidos a las ${NOW_HOUR}:${NOW_MIN} UTC (ventana: 15:00-05:00 UTC)" >> $GITHUB_OUTPUT
          fi

  # ── Sync live scores ─────────────────────────────────────────────
  sync:
    name: Sync scores
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'

    steps:
      - name: Log reason
        run: |
          echo "Corriendo porque: ${{ needs.check.outputs.reason }}"

      - name: Call sync endpoint
        run: |
          MODE="${{ github.event.inputs.mode || 'live' }}"
          BASE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"

          echo "→ Syncing mode=$MODE"

          # mode=live → /api/cron/sync-live (scores en vivo + marcar finalizados)
          # mode=today|all → /api/fixture/sync (fixture completo o del día)
          if [ "$MODE" = "live" ]; then
            ENDPOINT="${BASE_URL}/api/cron/sync-live"
            AUTH_HEADER="Bearer ${{ secrets.CRON_SECRET }}"
            HTTP_METHOD="GET"
          else
            ENDPOINT="${BASE_URL}/api/fixture/sync?mode=${MODE}"
            AUTH_HEADER="Bearer ${{ secrets.WEBHOOK_SECRET }}"
            HTTP_METHOD="POST"
          fi

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X $HTTP_METHOD "$ENDPOINT" \
            -H "Authorization: $AUTH_HEADER" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 3)

          cat /tmp/response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Sync falló con HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Live sync falló. Verificar logs."
